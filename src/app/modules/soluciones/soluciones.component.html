<section id="soluciones" class="w-full max-w-[1440px] mx-auto px-4 sm:px-6 lg:px-8 pt-16 lg:pt-20 pb-8 lg:pb-10 scroll-mt-24 bg-[#efefef]">
  <div class="mb-8">
    <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white mb-4">
      <span class="w-2.5 h-2.5 rounded-full bg-[#009250] shrink-0"></span>
      <span class="text-[#000000] font-normal text-sm">Soluciones</span>
    </div>
    <h2 class="text-3xl sm:text-4xl lg:text-5xl font-normal text-[#000000] leading-tight">
      Así hacemos posible su Facility Management
    </h2>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-[1fr_2fr_1.2fr] gap-6 lg:gap-8 items-start">
    <div class="flex flex-col gap-3">
      @for (item of solutionItems; track item.id) {
        <button
          type="button"
          (click)="setActiveSolution(item.id)"
          class="flex items-center gap-3 px-5 py-4 text-left rounded-xl w-full border transition-all duration-300 ease-out"
          [class.bg-[#2D2D2D]]="activeSolutionId() === item.id"
          [class.border-[#2D2D2D]]="activeSolutionId() === item.id"
          [class.text-[#009250]]="activeSolutionId() === item.id"
          [class.scale-105]="activeSolutionId() === item.id"
          [class.shadow-lg]="activeSolutionId() === item.id"
          [class.bg-white]="activeSolutionId() !== item.id"
          [class.text-[#000000]]="activeSolutionId() !== item.id"
          [class.border-gray-200]="activeSolutionId() !== item.id"
          [class.soluciones-tab-inactive]="activeSolutionId() !== item.id"
        >
          @if (activeSolutionId() === item.id) {
            <svg class="w-6 h-6 shrink-0 text-[#009250]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
          } @else {
            <div class="w-10 h-10 shrink-0 rounded-full border border-gray-300 flex items-center justify-center">
              @switch (item.icon) {
                @case ('lightning') {
                  <svg class="w-5 h-5 text-[#000000]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
                  </svg>
                }
                @case ('location') {
                  <svg class="w-5 h-5 text-[#000000]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                  </svg>
                }
                @case ('document') {
                  <svg class="w-5 h-5 text-[#000000]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                  </svg>
                }
                @case ('paper-plane') {
                  <svg class="w-5 h-5 text-[#000000]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                  </svg>
                }
                @case ('gear') {
                  <svg class="w-5 h-5 text-[#000000]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  </svg>
                }
              }
            </div>
          }
          <span class="font-normal text-base">{{ item.label }}</span>
        </button>
      }
    </div>

    <div class="lg:col-span-2 min-h-[320px] lg:min-h-[400px] relative overflow-hidden">
      @for (item of displayedItems(); track item._trackId) {
        <div
          [@fadeSlideInOut]
          class="absolute inset-0 grid grid-cols-1 lg:grid-cols-[2fr_1.2fr] gap-6 lg:gap-8 items-start"
        >
          <div class="relative rounded-3xl overflow-hidden aspect-[16/10] lg:aspect-[4/3]">
            <img
              [src]="item.image"
              [alt]="item.title"
              class="w-full h-full object-cover soluciones-slow-zoom"
            />
            @if (item.badge) {
              <div class="absolute bottom-4 right-4 bg-white/90 text-[#2D2D2D] px-4 py-2 rounded-full text-sm font-light shadow-sm">
                {{ item.badge }}
              </div>
            }
          </div>

          <div class="flex flex-col gap-4">
            <div class="w-12 h-12 shrink-0 rounded-lg bg-[#2D2D2D] flex items-center justify-center">
              <svg class="w-6 h-6 text-[#009250]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
              </svg>
            </div>
            <h3 class="text-xl font-normal text-[#2D2D2D]">{{ item.title }}</h3>
            <p class="text-[#2D2D2D] font-light leading-relaxed text-base">{{ item.description }}</p>
          </div>
        </div>
      }
    </div>
  </div>
</section>
