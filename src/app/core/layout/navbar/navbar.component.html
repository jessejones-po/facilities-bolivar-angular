<nav class="sticky top-0 z-50 w-full bg-white/80 shadow-sm backdrop-blur-md">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    <!-- Desktop: logo | nav centrado (min-w-0) | CTA -->
    <div
      class="hidden h-20 grid-cols-[auto_minmax(0,1fr)_auto] items-center gap-3 lg:grid lg:h-24 lg:gap-4 xl:gap-6"
    >
      <button
        type="button"
        (click)="scrollToSection('nosotros', $event)"
        class="flex shrink-0 cursor-pointer items-center justify-center justify-self-start rounded-lg bg-white/80 p-2"
      >
        <img
          src="https://www.facilitiesbolivar.com/assets/img/brand/1_FACILITIES_BOL%C3%8DVAR_LOGO.png"
          alt="Facilities Bolívar"
          class="h-12 w-auto object-contain sm:h-16"
          referrerpolicy="no-referrer"
        />
      </button>

      <div
        class="flex min-w-0 justify-center overflow-x-auto [-webkit-overflow-scrolling:touch] [scrollbar-width:thin]"
      >
        <div
          class="mx-auto flex max-w-full flex-nowrap items-center justify-center gap-x-3 lg:gap-x-4 xl:gap-x-6 px-0.5"
        >
          @for (item of navItems; track item.moduleId) {
            <button
              type="button"
              (click)="scrollToSection(item.moduleId, $event)"
              class="shrink-0 text-xs font-bold text-[#009250] transition-opacity hover:opacity-75 lg:text-sm xl:text-base"
            >
              {{ item.label }}
            </button>
          }
        </div>
      </div>

      <div class="flex shrink-0 items-center justify-self-end">
        <a
          [routerLink]="ctaNav.routerLink"
          (click)="closeMobileMenu()"
          class="inline-flex min-h-11 shrink-0 items-center justify-center whitespace-nowrap rounded-full bg-[#FFD700] px-4 py-2.5 text-center text-xs font-bold text-green-900 shadow-sm transition-all hover:brightness-95 xl:px-6 xl:py-3 xl:text-sm 2xl:px-10 2xl:text-base"
        >
          {{ ctaNav.label }}
        </a>
      </div>
    </div>

    <!-- Móvil -->
    <div class="flex h-20 items-center justify-between lg:hidden">
      <button
        type="button"
        (click)="scrollToSection('nosotros', $event)"
        class="flex min-w-0 cursor-pointer items-center justify-center rounded-lg bg-white/80 p-1.5 sm:p-2"
      >
        <img
          src="https://www.facilitiesbolivar.com/assets/img/brand/1_FACILITIES_BOL%C3%8DVAR_LOGO.png"
          alt="Facilities Bolívar"
          class="h-11 w-auto max-w-[min(100%,200px)] object-contain sm:h-12"
          referrerpolicy="no-referrer"
        />
      </button>

      <div class="flex shrink-0 items-center">
        <button
          type="button"
          (click)="toggleMobileMenu()"
          class="p-2 text-[#009250] hover:opacity-75 focus:outline-none"
          aria-label="Menú"
        >
          @if (isMobileMenuOpen()) {
            <svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          } @else {
            <svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          }
        </button>
      </div>
    </div>
  </div>

  @if (isMobileMenuOpen()) {
    <div
      class="absolute left-0 top-full flex w-full flex-col gap-2 border-t border-gray-200/50 bg-white/90 px-4 py-4 shadow-xl backdrop-blur-md lg:hidden"
    >
      @for (item of navItems; track item.moduleId) {
        <button
          type="button"
          (click)="scrollToSection(item.moduleId, $event)"
          class="block rounded-lg px-4 py-3 text-left text-base font-bold text-[#009250] transition-colors hover:bg-[#efefef]/80"
        >
          {{ item.label }}
        </button>
      }
      <div class="px-1 pb-2 pt-4">
        <a
          [routerLink]="ctaNav.routerLink"
          (click)="closeMobileMenu()"
          class="mx-auto flex min-h-11 w-full max-w-md items-center justify-center rounded-full bg-[#FFD700] px-4 py-3 text-center text-sm font-bold leading-snug text-green-900 shadow-sm transition-all hover:brightness-95 sm:min-h-[44px] sm:px-6 sm:text-base"
        >
          {{ ctaNav.label }}
        </a>
      </div>
    </div>
  }
</nav>
